<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel ="stylesheet" href ="style.css">
</head>
<body>
    <h1> Etch-A-Sketch</h1>

       <input type="text" class="grid-size" placeholder="enter grid size(<=100)">
       <button>Set</button>
      
    
    <div class ="container"></div>
    
    <script>
        const container = document.querySelector(".container")
        const gridSize = document.querySelector(".grid-size")
        const button = document.querySelector("button")
        let newSize =16;
     
        button.addEventListener("click",()=>{
            container.classList.toggle('is-hidden')
            container.replaceChildren()

               const inp = gridSize.value
            newSize=inp;
            console.log(inp)
        
        
        
        if(newSize=='' ){
    
        newSize =16;
        }
        if(newSize>100){
            newSize=100
        }
        const containerSize= 1000;
        const dSize =containerSize/newSize;
        const RandomRGB = () => {
            const r = Math.floor(Math.random()*256)
            const g = Math.floor(Math.random()*256)
            const b =Math.floor(Math.random()*256)
            return `rgb(${r},${g},${b})`

        }

    

        for(let i=0;i<(newSize*newSize);i++){

            const newDiv = document.createElement("div")
           //newDiv.textContent=i;
          //  newDiv.classList.add("item")
            newDiv.style.width=`${dSize}px`
            newDiv.style.height=`${dSize}px`
        
            container.appendChild(newDiv)
           // console.log(RandomRGB())
            newDiv.addEventListener("mouseenter",() =>{
                newDiv.style.background = RandomRGB()
            })

        }
        container.classList.remove('is-hidden')
     })
        //console.log(item.innerHTML)

    </script>
     <p>Press set again to clear the grid</p>
    
</body>
</html>
